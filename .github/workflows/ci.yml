name: CI

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build CLI
        run: npm run build

      - name: Verify CLI binary
        run: node dist/cli.js --help

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    # Note: do NOT set CTX_INSTANCE_ID / CTX_ORG at the job level. The
    # test fixtures (e.g. tests/unit/cli/obsidian.test.ts) build sandboxes
    # under instance "default"; a job-level override broke fixture lookup
    # in the obsidian suite while leaving local runs green. Tests that
    # need specific values set them via process.env in beforeEach.
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Build CLI
        # Tests depend on dist/cli.js for end-to-end assertions. Each GH
        # Actions job runs in its own VM, so dist/ from the build job is not
        # shared here. Cheap rebuild (~35ms via tsup).
        run: npm run build

      - name: Run unit tests
        run: npm test

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      # Build-only credentials. Configure CI_AUTH_SECRET and CI_ADMIN_PASSWORD
      # in repo settings (Settings > Secrets and variables > Actions) to override.
      # Fallback values are only used for local build/typecheck and must never
      # be used in production environments.
      AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET || 'ci-fallback-do-not-use-in-prod' }}
      AUTH_TRUST_HOST: 'true'
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci-fallback' }}
      CTX_INSTANCE_ID: ci-test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Type check dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build
