<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Deep space background -->
  <defs>
    <radialGradient id="cosmic" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1A2547" stop-opacity="1" />
      <stop offset="50%" stop-color="#0E1428" stop-opacity="1" />
      <stop offset="100%" stop-color="#050510" stop-opacity="1" />
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A5C9FF" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#A5C9FF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#A5C9FF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6ECFF" />
      <stop offset="100%" stop-color="#A5C9FF" />
    </linearGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1200" height="630" fill="url(#cosmic)" />

  <!-- Starfield: scattered stars at varying sizes/opacity -->
  <g fill="#E6ECFF">
    <circle cx="80" cy="90" r="1.2" opacity="0.6" />
    <circle cx="180" cy="45" r="0.8" opacity="0.5" />
    <circle cx="280" cy="120" r="1.5" opacity="0.7" />
    <circle cx="350" cy="60" r="0.9" opacity="0.5" />
    <circle cx="420" cy="180" r="1.1" opacity="0.6" />
    <circle cx="540" cy="80" r="0.7" opacity="0.4" />
    <circle cx="640" cy="140" r="1.3" opacity="0.65" />
    <circle cx="780" cy="55" r="1.0" opacity="0.55" />
    <circle cx="880" cy="170" r="1.6" opacity="0.7" />
    <circle cx="980" cy="100" r="0.9" opacity="0.5" />
    <circle cx="1080" cy="200" r="1.2" opacity="0.6" />
    <circle cx="1140" cy="60" r="0.8" opacity="0.45" />
    <circle cx="60" cy="280" r="1.0" opacity="0.5" />
    <circle cx="200" cy="320" r="0.7" opacity="0.4" />
    <circle cx="380" cy="380" r="1.4" opacity="0.65" />
    <circle cx="500" cy="450" r="0.9" opacity="0.45" />
    <circle cx="700" cy="430" r="1.1" opacity="0.55" />
    <circle cx="850" cy="380" r="0.8" opacity="0.4" />
    <circle cx="990" cy="450" r="1.5" opacity="0.7" />
    <circle cx="1120" cy="350" r="1.0" opacity="0.5" />
    <circle cx="120" cy="500" r="0.9" opacity="0.5" />
    <circle cx="240" cy="560" r="1.2" opacity="0.6" />
    <circle cx="430" cy="540" r="0.8" opacity="0.45" />
    <circle cx="620" cy="580" r="1.3" opacity="0.6" />
    <circle cx="810" cy="540" r="0.7" opacity="0.4" />
    <circle cx="970" cy="585" r="1.0" opacity="0.5" />
    <circle cx="1100" cy="540" r="0.9" opacity="0.45" />
  </g>

  <!-- Accent gold dust -->
  <g fill="#FFD27A">
    <circle cx="320" cy="220" r="1.5" opacity="0.45" />
    <circle cx="780" cy="320" r="1.3" opacity="0.4" />
    <circle cx="150" cy="420" r="1.0" opacity="0.35" />
    <circle cx="940" cy="240" r="1.2" opacity="0.4" />
  </g>

  <!-- Star glow halo -->
  <circle cx="600" cy="240" r="180" fill="url(#starGlow)" />

  <!-- Sirius mark (the 4-point star), centered at (600, 240) scaled to 110px tall -->
  <g transform="translate(490, 130) scale(3.4375)">
    <path
      d="M 32 4 L 34 30 L 60 32 L 34 34 L 32 60 L 30 34 L 4 32 L 30 30 Z"
      fill="url(#markGradient)"
    />
    <circle cx="32" cy="32" r="2.5" fill="#FFFFFF" />
  </g>

  <!-- Wordmark + tagline -->
  <text
    x="600"
    y="430"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Sora', system-ui, sans-serif"
    font-size="78"
    font-weight="600"
    letter-spacing="-2"
    fill="#E6ECFF"
  >SiriusOS</text>

  <text
    x="600"
    y="490"
    text-anchor="middle"
    font-family="'Sora', system-ui, sans-serif"
    font-size="26"
    font-weight="400"
    letter-spacing="-0.3"
    fill="#7A89B8"
  >Persistent AI agents · always on</text>

  <!-- Footer pill: tagline + URL -->
  <g transform="translate(600, 555)">
    <rect
      x="-200"
      y="-20"
      width="400"
      height="40"
      rx="20"
      fill="#0E1428"
      stroke="#1F2A4D"
      stroke-width="1"
    />
    <text
      x="0"
      y="6"
      text-anchor="middle"
      font-family="'JetBrains Mono', monospace"
      font-size="14"
      font-weight="500"
      letter-spacing="2"
      fill="#A5C9FF"
    >NPM INSTALL -G SIRIUSOS</text>
  </g>
</svg>
